    <!-- Disparo de Lead no envio do formulario -->
    <script>
      (function () {
        var leadEnviado = false;
        document.addEventListener(
          "submit",
          function (e) {
            var form = e.target;
            if (!form || form.tagName !== "FORM") return;
            if (leadEnviado) return; // trava anti-duplicacao
            leadEnviado = true;
            if (typeof fbq === "function") {
              fbq("track", "Lead");
            }
          },
          true
        );
      })();
    </script>
